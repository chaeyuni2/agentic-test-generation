name: Agentic Test Generation

on:
  push:
    branches:
      - main

jobs:
  run-test-generation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai pytest requests fastapi uvicorn

      - name: Show changed files
        run: |
          echo "=== git diff --name-only HEAD~1 HEAD ==="
          git diff --name-only HEAD~1 HEAD || true

      - name: Run extract_diff
        run: |
          python extract_diff.py \
            --base-ref HEAD~1 \
            --head-ref HEAD \
            --output outputs/changed_files.json

      - name: Show changed_files.json
        if: always()
        run: |
          echo "=== changed_files.json ==="
          cat outputs/changed_files.json || true

      - name: Run extract_changed_methods
        run: |
          python extract_changed_methods.py \
            --changed-files-json outputs/changed_files.json \
            --output outputs/changed_methods.json

      - name: Show changed_methods.json
        if: always()
        run: |
          echo "=== changed_methods.json ==="
          cat outputs/changed_methods.json || true

      - name: Run LLM test generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_MODEL: openai/gpt-4.1-mini
        run: |
          python generate_tests.py \
            --changed-files-json outputs/changed_files.json \
            --output-dir outputs/test_scenarios

      - name: List generated scenario files
        if: always()
        run: |
          echo "=== outputs/test_scenarios ==="
          ls -R outputs/test_scenarios || true

      - name: Generate pytest files
        run: |
          python generate_pytest_from_json.py \
            --input-dir outputs/test_scenarios \
            --output-dir outputs/generated_pytests

      - name: List generated pytest files
        if: always()
        run: |
          echo "=== outputs/generated_pytests ==="
          ls -R outputs/generated_pytests || true

      - name: Show generated pytest content
        if: always()
        run: |
          echo "=== generated pytest content ==="
          find outputs/generated_pytests -name 'test_*.py' -maxdepth 1 -print -exec cat {} \; || true

      - name: Start mock server
        run: |
          nohup python -m uvicorn mock_server:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          sleep 5

      - name: Run generated pytest
        run: |
          if [ ! -d outputs/generated_pytests ]; then
            echo "outputs/generated_pytests directory does not exist. Skipping pytest."
            exit 0
          fi

          if [ -z "$(find outputs/generated_pytests -name 'test_*.py' -print -quit)" ]; then
            echo "No generated pytest files found. Skipping pytest."
            exit 0
          fi

          pytest outputs/generated_pytests -q

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-test-artifacts
          path: |
            outputs/
            server.log