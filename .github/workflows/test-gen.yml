name: Agentic Test Generation (JUnit)

on:
  push:
    branches:
      - main

jobs:
  run-test-generation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Show changed files
        run: |
          echo "=== git diff --name-only HEAD~1 HEAD ==="
          git diff --name-only HEAD~1 HEAD || true

      - name: Run extract_diff
        run: |
          python extract_diff.py \
            --base-ref HEAD~1 \
            --head-ref HEAD \
            --output outputs/changed_files.json

      - name: Show changed_files.json
        if: always()
        run: |
          echo "=== changed_files.json ==="
          cat outputs/changed_files.json || true

      - name: Run extract_changed_methods
        run: |
          python extract_changed_methods.py \
            --changed-files-json outputs/changed_files.json \
            --output outputs/changed_methods.json

      - name: Show changed_methods.json
        if: always()
        run: |
          echo "=== changed_methods.json ==="
          cat outputs/changed_methods.json || true

      - name: Run LLM test scenario generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_MODEL: openai/gpt-4.1-mini
        run: |
          python generate_tests.py \
            --changed-files-json outputs/changed_files.json \
            --output-dir outputs/test_scenarios

      - name: List generated scenario files
        if: always()
        run: |
          echo "=== outputs/test_scenarios ==="
          ls -R outputs/test_scenarios || true

      - name: Show generated scenario content
        if: always()
        run: |
          echo "=== generated scenario content ==="
          find outputs/test_scenarios -name '*.json' ! -name '_summary.json' -maxdepth 1 -print -exec cat {} \; || true

      - name: Generate JUnit files
        run: |
          python generate_junit_from_json.py \
            --input-dir outputs/test_scenarios \
            --output-dir src/test/java

      - name: List generated JUnit files
        if: always()
        run: |
          echo "=== generated junit files ==="
          find src/test/java -name '*GeneratedTest.java' -print || true

      - name: Show generated JUnit content
        if: always()
        run: |
          echo "=== generated junit content ==="
          find src/test/java -name '*GeneratedTest.java' -print -exec cat {} \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-junit-artifacts
          path: |
            outputs/
            src/test/java/